name: museum_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Default Icon font
  cupertino_icons: ^1.0.8

  # --- ADDED FOR MUSEUM APP ---
  # 1. State Management (Connects logic to UI)
  provider: ^6.1.2

  # 2. Local Storage (Saves settings like Language/Dark Mode)
  shared_preferences: ^2.2.3

  # 3. Localization (Handles Arabic/English logic)
  intl: ^0.20.2

  # 4. Audio (Plays the robot voice narration)
  audioplayers: ^6.0.0

  # 5. Scanner and Permissions (Moved from dev_dependencies)
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1

  # 6. Typography (Cinzel and Inter fonts)
  google_fonts: ^6.1.0

  # 7. Local Notifications (Push notifications, scheduling, channels)
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.0.0
  mqtt_client: ^10.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0 # Note: Downgraded slightly to ensure compatibility with sdk 3.10.1

flutter:
  generate: true # Added for l10n
  uses-material-design: true

  assets:
    - assets/images/
    - assets/artifacts/
    - assets/icons/
    - assets/fonts/
    - shared/booking-product-system/exhibits.v1.json

  fonts:
    - family: Playfair Display 
      fonts:
        - asset: assets/fonts/static/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/static/PlayfairDisplay-Bold.ttf 
          weight: 700
